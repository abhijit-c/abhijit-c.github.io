  sections:
    About Me:
      - I consider myself a computational mathematician and my research
        interests lie in wielding math to design algorithms for real-world
        problems. I practice that in developing scalable algorithms to
        quantify, analyze, and control the uncertainty inherent in
        mathematical models. During my Ph.D., I focused on the uncertainty
        quantification (UQ) of large-scale inverse problems for physical
        phenomena governed by partial differential equations (PDEs). 
        At the moment, I'm pursuing new directions in computational math,
        via problem structure-exploiting neural architectures, uncertainty
        quantification, randomized algorithms, among more.
