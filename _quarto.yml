project:
  type: website

website:
  title: "Abhijit Chowdhary"
  site-url: https://abhijit-c.github.io
  favicon: assets/img/favicon.svg
  navbar:
    left:
      - href: index.qmd
        text: About
      - href: research.qmd
        text: Research
      - href: publications.qmd
        text: Publications
      #- href: teaching.qmd
      #  text: Teaching
      - text: CV
        href: assets/pdf/CV.pdf
        target: _blank
      - href: journal/index.qmd
        text: Journal
      - href: news.qmd
        text: News
  page-footer:
    left: "Abhijit Chowdhary"
    right: "Built with [Quarto](https://quarto.org)"

execute:
  freeze: auto

callouty-theorem:
  thm:
    override-title: false
    callout:
      type: note
      appearance: minimal
  prp:
    override-title: false
    callout:
      type: note
      appearance: minimal
  proof:
    override-title: true
    callout:
      type: note
      appearance: default
      collapse: true
      icon: false

format:
  html:
    filters:
      - callouty-theorem
    theme:
      light: litera
      dark:
        - cyborg
        - cyborg-fixes.scss
    respect-user-color-scheme: true
    css: styles.css
    toc: false
    include-after-body:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function () {
          document.querySelectorAll('.pub details pre').forEach(function (pre) {
            var wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);
            var btn = document.createElement('button');
            btn.textContent = 'Copy';
            btn.className = 'btn btn-sm btn-outline-secondary bibtex-copy-btn';
            btn.addEventListener('click', function () {
              navigator.clipboard.writeText(pre.textContent.trim()).then(function () {
                btn.textContent = 'Copied!';
                setTimeout(function () { btn.textContent = 'Copy'; }, 1500);
              });
            });
            wrapper.appendChild(btn);
          });
        });
        </script>
